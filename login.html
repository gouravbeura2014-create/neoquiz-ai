<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>NeoQuiz Login</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

overflow:hidden;

color:white;

}

.bg-circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.05);

animation:float 15s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-120vh);
}

}

.container{

width:90%;
max-width:420px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

padding:30px;

border-radius:30px;

z-index:2;

}

.logo{

text-align:center;

font-size:38px;

margin-bottom:10px;

}

.title{

text-align:center;

font-size:28px;

font-weight:800;

margin-bottom:5px;

}

.subtitle{

text-align:center;

font-size:13px;

color:#cbd5e1;

margin-bottom:25px;

}

.input-group{

margin-bottom:15px;

}

.input-group input{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:rgba(255,255,255,.08);

color:white;

outline:none;

}

.options{

display:flex;

justify-content:space-between;

font-size:13px;

margin-bottom:20px;

}

.btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

cursor:pointer;

font-weight:700;

margin-bottom:12px;

}

.login-btn{

background:#2563eb;

color:white;

}

.signup-btn{

background:#10b981;

color:white;

}

.guest-btn{

background:#475569;

color:white;

}

.footer{

text-align:center;

margin-top:10px;

font-size:13px;

color:#cbd5e1;

}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="logo">
🧠
</div>

<div class="title">
NeoQuiz Pro
</div>

<div class="subtitle">
Learn. Play. Compete.
</div>

<div class="input-group">

<input
type="text"
id="username"
placeholder="Username">

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="Password">

</div>

<div class="options">

<label>

<input
type="checkbox"
id="remember">

 Remember Me

</label>

<span>
Forgot Password?
</span>

</div>

<button
class="btn login-btn"
onclick="login()">

Login

</button>

<button
class="btn signup-btn"
onclick="signup()">

Sign Up

</button>

<button
class="btn guest-btn"
onclick="guestLogin()">

Continue as Guest

</button>

<div class="footer">

Welcome to NeoQuiz Pro

</div>

</div>
  <script>

// CREATE PARTICLES

const particles =
document.getElementById(
"particles"
);

for(let i=0;i<25;i++){

const circle =
document.createElement("div");

circle.classList.add(
"bg-circle"
);

const size =
Math.random()*100+40;

circle.style.width =
size+"px";

circle.style.height =
size+"px";

circle.style.left =
Math.random()*100+"vw";

circle.style.animationDuration =
Math.random()*10+10+"s";

circle.style.opacity =
Math.random()*0.3;

particles.appendChild(
circle
);

}

// LOGIN

function login(){

const username =
document.getElementById(
"username"
).value;

const password =
document.getElementById(
"password"
).value;

if(
username.trim()===""
||
password.trim()===""
){

alert(
"Please fill all fields."
);

return;

}

localStorage.setItem(
"currentUser",
username
);

if(
document.getElementById(
"remember"
).checked
){

localStorage.setItem(
"rememberUser",
username
);

}

alert(
"Login Successful ✅"
);

window.location.href =
"index.html";

}

// SIGNUP

function signup(){

const username =
document.getElementById(
"username"
).value;

const password =
document.getElementById(
"password"
).value;

if(
username.trim()===""
||
password.trim()===""
){

alert(
"Enter username and password."
);

return;

}

localStorage.setItem(
"user_"+username,
password
);

alert(
"Account Created 🎉"
);

}

// GUEST LOGIN

function guestLogin(){

localStorage.setItem(
"currentUser",
"Guest"
);

window.location.href =
"index.html";

}

// AUTO FILL

const remembered =
localStorage.getItem(
"rememberUser"
);

if(remembered){

document.getElementById(
"username"
).value =
remembered;

document.getElementById(
"remember"
).checked =
true;

}

// ENTER KEY LOGIN

document.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

login();

}

});

</script>

</body>
</html>
